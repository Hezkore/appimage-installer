name: Make new release

on:
  workflow_dispatch:
    inputs:
      major:
        description: Bump major by
        required: true
        type: number
        default: 0
      minor:
        description: Bump minor by
        required: true
        type: number
        default: 0
      patch:
        description: Bump patch by
        required: true
        type: number
        default: 0

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check inputs
        if: inputs.major == 0 && inputs.minor == 0 && inputs.patch == 0
        run: |
          set -euo pipefail
          echo "All version bumps are 0, nothing to release"
          exit 1

      - name: Set version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(grep -oP '(?<=INSTALLER_VERSION = ")[^"]+' source/constants.d)
          IFS='.' read -r CUR_MAJOR CUR_MINOR CUR_PATCH <<< "$CURRENT"
          NEW_MAJOR=$(( CUR_MAJOR + ${{ inputs.major }} ))
          NEW_MINOR=$(( CUR_MINOR + ${{ inputs.minor }} ))
          NEW_PATCH=$(( CUR_PATCH + ${{ inputs.patch }} ))
          VERSION="$NEW_MAJOR.$NEW_MINOR.$NEW_PATCH"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Computed version is not valid semver: $VERSION"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - runs-on: ubuntu-24.04
            arch: x86_64
            compiler: dmd-latest
            dub_compiler: dmd
          - runs-on: ubuntu-24.04-arm
            arch: aarch64
            compiler: ldc-latest
            dub_compiler: ldc2
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Patch version
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/enum string INSTALLER_VERSION = \".*\";/enum string INSTALLER_VERSION = \"$VERSION\";/" source/constants.d
          grep -q "INSTALLER_VERSION = \"$VERSION\"" source/constants.d \
            || { echo "Version patch failed"; exit 1; }

      - name: Install GTK4
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends libgtk-4-dev

      - name: Set up D
        uses: dlang-community/setup-dlang@0a7469b93f791d83f30932c6fd105796c6966e20 # v2.0.0
        with:
          compiler: ${{ matrix.compiler }}

      - name: Build
        run: dub build -b release --compiler=${{ matrix.dub_compiler }}

      - name: Strip binary
        run: strip -s appimage-installer

      - name: Health check
        run: ./appimage-installer --health

      - name: Package
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          ARCHIVE="AppImage_Installer-${VERSION}-${ARCH}.tar.gz"
          sha256sum appimage-installer > appimage-installer.sha256
          tar czf "$ARCHIVE" appimage-installer appimage-installer.sha256 README.md
          cp appimage-installer.sha256 "appimage-installer-${ARCH}.sha256"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            AppImage_Installer-*.tar.gz
            AppImage_Installer-*.tar.gz.sha256
            appimage-installer-*.sha256

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Verify checksums
        run: |
          set -euo pipefail
          for f in AppImage_Installer-*.tar.gz; do
            echo "Verifying $f..."
            sha256sum --check "${f}.sha256"
          done

      - name: Build release notes
        run: |
          set -euo pipefail
          FIRST=true
          {
            for ARCH in x86_64 aarch64; do
              BIN_SHA_FILE="appimage-installer-${ARCH}.sha256"
              [[ -f "$BIN_SHA_FILE" ]] || continue
              if [[ "$FIRST" != "true" ]]; then
                echo ""
                echo "---"
                echo ""
              fi
              FIRST=false
              ARC_SHA_FILES=(AppImage_Installer-*-${ARCH}.tar.gz.sha256)
              ARC_SHA_FILE="${ARC_SHA_FILES[0]}"
              ARCHIVE=$(basename "${ARC_SHA_FILE%.sha256}")
              BIN_SHA=$(awk '{print $1}' "$BIN_SHA_FILE")
              ARC_SHA=$(awk '{print $1}' "$ARC_SHA_FILE")
              echo "## ${ARCH}"
              echo ""
              echo "**appimage-installer** Binary SHA256:"
              echo "\`${BIN_SHA}\`"
              echo ""
              echo "**${ARCHIVE}** SHA256:"
              echo "\`${ARC_SHA}\`"
            done
          } > release_notes.md
          cat release_notes.md

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          gh release create "$VERSION" \
            AppImage_Installer-*.tar.gz \
            AppImage_Installer-*.tar.gz.sha256 \
            --title "AppImage Installer v$VERSION" \
            --notes-file release_notes.md

      - name: Push version bump
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/enum string INSTALLER_VERSION = \".*\";/enum string INSTALLER_VERSION = \"$VERSION\";/" source/constants.d
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/constants.d
          git commit -m "Bump version to $VERSION"
          git pull --rebase origin main
          git push origin main
